<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ODAE — Panel de Propuestas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0C0C0C;
      --surface: #141414;
      --card:    #1A1A1A;
      --border:  #2A2A2A;
      --yellow:  #F5C518;
      --white:   #FFFFFF;
      --gray:    #7A7A7A;
      --light:   #CCCCCC;
      --green:   #22c55e;
      --red:     #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1.2rem;
    }
    .logo span { color: var(--yellow); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #badge-count {
      background: var(--yellow);
      color: var(--bg);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      display: none;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gray);
      font-size: 0.8rem;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: var(--yellow); color: var(--white); }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-card h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .login-card p { color: var(--gray); font-size: 0.9rem; margin-bottom: 28px; }
    .login-card input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--white);
      font-size: 0.95rem;
      padding: 12px 16px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: var(--yellow); }
    .login-card button {
      width: 100%;
      background: var(--yellow);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-card button:hover { background: #FFD700; }
    #login-error {
      color: var(--red);
      font-size: 0.82rem;
      margin-top: 10px;
      display: none;
    }

    /* ── Main ── */
    #main-screen { display: none; padding: 32px; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .stat-pill {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 20px;
      min-width: 140px;
    }
    .stat-pill .num {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--yellow);
      line-height: 1;
    }
    .stat-pill .lbl { font-size: 0.75rem; color: var(--gray); margin-top: 4px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .toolbar input[type="text"] {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--white);
      font-size: 0.875rem;
      padding: 8px 14px;
      outline: none;
      width: 240px;
      transition: border-color 0.2s;
    }
    .toolbar input[type="text"]:focus { border-color: var(--yellow); }
    .toolbar select {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--light);
      font-size: 0.875rem;
      padding: 8px 14px;
      outline: none;
      cursor: pointer;
    }
    .btn-export {
      background: var(--yellow);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 18px;
      cursor: pointer;
      margin-left: auto;
      transition: background 0.2s;
    }
    .btn-export:hover { background: #FFD700; }
    .btn-refresh {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--light);
      border-radius: 6px;
      font-size: 0.8rem;
      padding: 8px 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-refresh:hover { border-color: var(--yellow); }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    thead th {
      background: var(--surface);
      color: var(--yellow);
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: #FFD700; }
    thead th .sort-icon { opacity: 0.4; margin-left: 4px; }
    thead th.sorted .sort-icon { opacity: 1; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(245,197,24,0.04); }
    tbody td {
      padding: 11px 14px;
      color: var(--light);
      vertical-align: top;
    }
    tbody td.fecha { color: var(--gray); font-size: 0.78rem; white-space: nowrap; }
    tbody td.nombre { color: var(--white); font-weight: 600; }
    tbody td.email a { color: var(--yellow); text-decoration: none; }
    tbody td.email a:hover { text-decoration: underline; }
    tbody td.desc {
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    tbody td.desc:hover { white-space: normal; overflow: visible; }
    .tag-disciplina {
      display: inline-block;
      background: rgba(245,197,24,0.12);
      color: var(--yellow);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .tag-servicio {
      display: inline-block;
      background: var(--surface);
      color: var(--light);
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 4px;
      margin: 1px 2px 1px 0;
      white-space: nowrap;
    }

    /* ── Empty / loading ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
    }
    .state-msg .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .state-msg p { font-size: 0.9rem; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #main-screen { padding: 16px; }
      .table-wrap { overflow-x: auto; }
      .table-wrap table { min-width: 900px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">OD<span>AE</span> <span style="color:var(--gray);font-weight:400;font-size:0.85rem;margin-left:6px;">Panel Admin</span></div>
  <div class="header-right">
    <span id="badge-count"></span>
    <button class="btn-logout" id="btnLogout" style="display:none" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>
</header>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <h2>Acceso <span style="color:var(--yellow)">restringido</span></h2>
    <p>Introduce la clave para ver las propuestas</p>
    <input type="password" id="inputClave" placeholder="Clave de acceso" onkeydown="if(event.key==='Enter')entrar()" autofocus />
    <button onclick="entrar()">Entrar →</button>
    <div id="login-error">Clave incorrecta. Inténtalo de nuevo.</div>
  </div>
</div>

<!-- ── Main ── -->
<div id="main-screen">
  <div class="stats-bar" id="statsBar"></div>

  <div class="toolbar">
    <input type="text" id="busqueda" placeholder="Buscar por nombre, email, ciudad..." oninput="filtrar()" />
    <select id="filtroDisciplina" onchange="filtrar()">
      <option value="">Todas las disciplinas</option>
    </select>
    <button class="btn-refresh" onclick="cargarDatos()">↺ Actualizar</button>
    <button class="btn-export" onclick="exportarCSV()">⬇ Exportar CSV</button>
  </div>

  <div class="table-wrap">
    <div id="tableContent">
      <div class="state-msg">
        <div class="spinner"></div>
        <p>Cargando propuestas...</p>
      </div>
    </div>
  </div>
</div>

<script>
  // ── CONFIGURACIÓN ────────────────────────────────────────
  const SCRIPT_URL = 'PEGA_AQUI_TU_URL';
  // ────────────────────────────────────────────────────────

  const COLS = ['Fecha','Nombre artístico','Nombre real','Email','Teléfono','Disciplina','Ciudad','Redes','Descripción','Qué busca','Otros'];

  let datos = [];        // filas crudas (sin cabecera)
  let datosFiltrados = [];
  let sortCol = 0;
  let sortAsc = false;
  let claveAdmin = '';

  function entrar() {
    const clave = document.getElementById('inputClave').value.trim();
    if (!clave) return;
    claveAdmin = clave;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    document.getElementById('btnLogout').style.display = 'inline-block';
    cargarDatos();
  }

  function cerrarSesion() {
    claveAdmin = '';
    datos = [];
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('inputClave').value = '';
    document.getElementById('btnLogout').style.display = 'none';
    document.getElementById('badge-count').style.display = 'none';
  }

  async function cargarDatos() {
    document.getElementById('tableContent').innerHTML =
      '<div class="state-msg"><div class="spinner"></div><p>Cargando propuestas...</p></div>';

    try {
      const res = await fetch(SCRIPT_URL + '?key=' + encodeURIComponent(claveAdmin));
      const json = await res.json();

      if (!Array.isArray(json)) {
        if (json.error === 'No autorizado') {
          document.getElementById('login-error').style.display = 'block';
          cerrarSesion();
          return;
        }
        throw new Error(json.error || 'Respuesta inesperada');
      }

      // Primera fila = cabeceras, resto = datos
      datos = json.length > 1 ? json.slice(1) : [];
      datosFiltrados = [...datos];

      actualizarFiltrosDisciplina();
      actualizarStats();
      renderTabla();

      const badge = document.getElementById('badge-count');
      badge.textContent = datos.length + ' propuestas';
      badge.style.display = 'inline-block';

    } catch (err) {
      document.getElementById('tableContent').innerHTML =
        '<div class="state-msg"><div class="icon">⚠️</div><p>Error al cargar: ' + err.message + '</p></div>';
    }
  }

  function actualizarFiltrosDisciplina() {
    const disciplinas = [...new Set(datos.map(r => r[5]).filter(Boolean))].sort();
    const sel = document.getElementById('filtroDisciplina');
    sel.innerHTML = '<option value="">Todas las disciplinas</option>';
    disciplinas.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      sel.appendChild(opt);
    });
  }

  function actualizarStats() {
    const bar = document.getElementById('statsBar');
    const disciplinas = {};
    datos.forEach(r => {
      const d = r[5] || 'Sin especificar';
      disciplinas[d] = (disciplinas[d] || 0) + 1;
    });
    const topDisciplina = Object.entries(disciplinas).sort((a,b)=>b[1]-a[1])[0];

    bar.innerHTML = `
      <div class="stat-pill"><div class="num">${datos.length}</div><div class="lbl">Propuestas totales</div></div>
      <div class="stat-pill"><div class="num">${Object.keys(disciplinas).length}</div><div class="lbl">Disciplinas distintas</div></div>
      ${topDisciplina ? `<div class="stat-pill"><div class="num" style="font-size:1rem">${topDisciplina[0].replace('Música — ','')}</div><div class="lbl">Disciplina más frecuente</div></div>` : ''}
    `;
  }

  function filtrar() {
    const texto = document.getElementById('busqueda').value.toLowerCase();
    const disciplina = document.getElementById('filtroDisciplina').value;

    datosFiltrados = datos.filter(r => {
      const coincideTexto = !texto || [r[1],r[2],r[3],r[6],r[8]].some(v => String(v).toLowerCase().includes(texto));
      const coincideDisciplina = !disciplina || r[5] === disciplina;
      return coincideTexto && coincideDisciplina;
    });

    renderTabla();
  }

  function ordenarPor(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    datosFiltrados.sort((a,b) => {
      const va = String(a[col] || '').toLowerCase();
      const vb = String(b[col] || '').toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
    renderTabla();
  }

  function renderTabla() {
    if (!datosFiltrados.length) {
      document.getElementById('tableContent').innerHTML =
        '<div class="state-msg"><div class="icon">🔍</div><p>No hay propuestas que coincidan.</p></div>';
      return;
    }

    const visibles = [0,1,2,3,5,6,8,9]; // columnas a mostrar
    const nombres  = ['Fecha','Nombre artístico','Nombre real','Email','Disciplina','Ciudad','Descripción','Qué busca'];

    let html = '<table><thead><tr>';
    visibles.forEach((ci, i) => {
      const sorted = sortCol === ci ? 'sorted' : '';
      const arrow  = sortCol === ci ? (sortAsc ? '↑' : '↓') : '↕';
      html += `<th class="${sorted}" onclick="ordenarPor(${ci})">${nombres[i]} <span class="sort-icon">${arrow}</span></th>`;
    });
    html += '</tr></thead><tbody>';

    datosFiltrados.forEach(row => {
      html += '<tr>';

      // Fecha
      html += `<td class="fecha">${row[0] || ''}</td>`;

      // Nombre artístico
      html += `<td class="nombre">${esc(row[1])}</td>`;

      // Nombre real
      html += `<td>${esc(row[2])}</td>`;

      // Email
      html += `<td class="email">${row[3] ? `<a href="mailto:${esc(row[3])}">${esc(row[3])}</a>` : ''}</td>`;

      // Disciplina
      html += `<td>${row[5] ? `<span class="tag-disciplina">${esc(row[5])}</span>` : ''}</td>`;

      // Ciudad
      html += `<td>${esc(row[6])}</td>`;

      // Descripción
      html += `<td class="desc" title="${esc(row[8])}">${esc(row[8])}</td>`;

      // Qué busca
      const servicios = String(row[9]||'').split(',').map(s=>s.trim()).filter(Boolean);
      html += `<td>${servicios.map(s=>`<span class="tag-servicio">${esc(s)}</span>`).join('')}</td>`;

      html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('tableContent').innerHTML = html;
  }

  function exportarCSV() {
    if (!datosFiltrados.length) return alert('No hay datos para exportar.');
    const cabecera = COLS.join(';');
    const filas = datosFiltrados.map(r => r.map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(';'));
    const csv = '\uFEFF' + [cabecera, ...filas].join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'odae_propuestas.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
